<html>
  <head>
    <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-box position="-1 0.5 -3" rotation="10 0 30" color="#626DE6"></a-box>
      <a-box position="2 2.5 -4" rotation="10 0 30" color="#F1B345"></a-box>
      <a-sphere position="0 2.25 -5" radius="2.25" color="#62D871"></a-sphere>
      <a-cylinder position="1.2 1.25 -2.5" radius="0.2" height="3.0" color="#21B29F" rotation="0 0 25"></a-cylinder>
      <a-cylinder position="-0.25 1.25 -2.5" radius="0.2" height="3.0" color="#9FB221" rotation="0 0 -25"></a-cylinder>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="8" height="8" color="#333333"></a-plane>
      <a-cone position="3 1 -2" rotation="0 0 0" color="#4590C0"></a-cone>
      <a-sky color="#ECECEC"></a-sky>
    </a-scene>
  </body>
</html>
